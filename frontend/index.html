<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Randonaut</title>
    <meta name="description" content="Open Randonaut — исследуй аномалии пространства через квантовую энтропию">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0e17;
            --bg-panel: rgba(12, 18, 30, 0.88);
            --border: rgba(100, 180, 255, 0.12);
            --border-glow: rgba(100, 180, 255, 0.3);
            --text: #c8d6e5;
            --text-dim: #5a6a7e;
            --text-bright: #e8f0ff;
            --accent: #4fc3f7;
            --accent-dim: rgba(79, 195, 247, 0.15);
            --attractor: #ff5252;
            --attractor-glow: rgba(255, 82, 82, 0.4);
            --void-color: #448aff;
            --void-glow: rgba(68, 138, 255, 0.4);
            --power: #ffd740;
            --power-glow: rgba(255, 215, 64, 0.5);
            --success: #69f0ae;
            --font-mono: 'JetBrains Mono', monospace;
            --font-ui: 'Inter', sans-serif;
        }

        body {
            font-family: var(--font-ui);
            background: var(--bg-dark);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* ============ Control Panel ============ */
        .panel {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1000;
            background: var(--bg-panel);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            width: 340px;
            max-height: calc(100vh - 32px);
            overflow-y: auto;
            transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .panel:hover {
            border-color: var(--border-glow);
            box-shadow: 0 0 40px rgba(79, 195, 247, 0.06);
        }

        .panel::-webkit-scrollbar {
            width: 4px;
        }

        .panel::-webkit-scrollbar-track {
            background: transparent;
        }

        .panel::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .panel-header .logo {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), #7c4dff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .panel-header h1 {
            font-family: var(--font-mono);
            font-size: 16px;
            font-weight: 600;
            color: var(--text-bright);
            letter-spacing: -0.5px;
        }

        .panel-header .version {
            font-size: 10px;
            color: var(--text-dim);
            font-family: var(--font-mono);
        }

        /* ============ Form Elements ============ */
        .field {
            margin-bottom: 16px;
        }

        .field label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            font-family: var(--font-mono);
        }

        .field input[type="text"],
        .field input[type="number"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            color: var(--text-bright);
            font-family: var(--font-mono);
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .field input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .field input::placeholder {
            color: var(--text-dim);
            opacity: 0.6;
        }

        .slider-field {
            margin-bottom: 16px;
        }

        .slider-field .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .slider-field label {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: var(--font-mono);
        }

        .slider-field .slider-value {
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--accent);
            font-weight: 600;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.08);
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(79, 195, 247, 0.4);
            transition: transform 0.15s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* ============ Button ============ */
        .btn-generate {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-family: var(--font-mono);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, var(--accent), #7c4dff);
            color: #fff;
            text-transform: uppercase;
        }

        .btn-generate:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(79, 195, 247, 0.3);
        }

        .btn-generate:active {
            transform: translateY(0);
        }

        .btn-generate:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-generate.loading {
            pointer-events: none;
        }

        .btn-generate.loading::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 200%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            100% {
                left: 100%;
            }
        }

        /* ============ Status ============ */
        .status-line {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            font-size: 11px;
            font-family: var(--font-mono);
            color: var(--text-dim);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-dim);
            flex-shrink: 0;
        }

        .status-dot.ready {
            background: var(--success);
            box-shadow: 0 0 8px rgba(105, 240, 174, 0.5);
            animation: pulse-dot 2s infinite;
        }

        .status-dot.working {
            background: var(--power);
            box-shadow: 0 0 8px var(--power-glow);
            animation: pulse-dot 0.8s infinite;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        /* ============ Entropy Sources ============ */
        .entropy-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 12px;
        }

        .entropy-tag {
            font-size: 9px;
            font-family: var(--font-mono);
            padding: 3px 8px;
            border-radius: 4px;
            background: rgba(79, 195, 247, 0.1);
            color: var(--accent);
            border: 1px solid rgba(79, 195, 247, 0.15);
        }

        /* ============ Hint ============ */
        .hint {
            text-align: center;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-dim);
            line-height: 1.5;
        }

        .hint .key {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border);
            font-family: var(--font-mono);
            font-size: 10px;
        }

        /* ============ Results Panel ============ */
        .results-panel {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 1000;
            background: var(--bg-panel);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            width: 320px;
            max-height: calc(100vh - 32px);
            overflow-y: auto;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .results-panel::-webkit-scrollbar {
            width: 4px;
        }

        .results-panel::-webkit-scrollbar-track {
            background: transparent;
        }

        .results-panel::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .results-panel h2 {
            font-family: var(--font-mono);
            font-size: 13px;
            font-weight: 600;
            color: var(--text-bright);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .results-panel h2 .count {
            background: var(--accent-dim);
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
        }

        .anomaly-card {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.02);
        }

        .anomaly-card:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(2px);
        }

        .anomaly-card.attractor {
            border-left: 3px solid var(--attractor);
        }

        .anomaly-card.void {
            border-left: 3px solid var(--void-color);
        }

        .anomaly-card.power {
            border-left: 3px solid var(--power);
        }

        .anomaly-type {
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .anomaly-card.attractor .anomaly-type {
            color: var(--attractor);
        }

        .anomaly-card.void .anomaly-type {
            color: var(--void-color);
        }

        .anomaly-card.power .anomaly-type {
            color: var(--power);
        }

        .anomaly-meta {
            font-size: 11px;
            font-family: var(--font-mono);
            color: var(--text-dim);
            line-height: 1.6;
        }

        .anomaly-meta strong {
            color: var(--text);
        }

        .anomaly-link {
            display: inline-block;
            margin-top: 6px;
            font-size: 10px;
            color: var(--accent);
            text-decoration: none;
            font-family: var(--font-mono);
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .anomaly-link:hover {
            opacity: 1;
        }

        /* ============ Crosshair ============ */
        .crosshair-cursor .leaflet-grab {
            cursor: crosshair !important;
        }

        .crosshair-cursor .leaflet-interactive {
            cursor: crosshair !important;
        }

        /* ============ Leaflet overrides ============ */
        .leaflet-control-zoom a {
            background: var(--bg-panel) !important;
            backdrop-filter: blur(12px) !important;
            color: var(--text) !important;
            border-color: var(--border) !important;
        }

        .leaflet-control-attribution {
            background: var(--bg-panel) !important;
            color: var(--text-dim) !important;
            font-size: 9px !important;
            backdrop-filter: blur(12px);
        }

        .leaflet-control-attribution a {
            color: var(--accent) !important;
        }

        /* ============ Pulse animation for markers ============ */
        @keyframes pulse-ring {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }

            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        .marker-attractor,
        .marker-void,
        .marker-power {
            border-radius: 50%;
            border: none;
        }

        .marker-attractor {
            background: var(--attractor);
            box-shadow: 0 0 12px var(--attractor-glow), 0 0 24px var(--attractor-glow);
        }

        .marker-void {
            background: var(--void-color);
            box-shadow: 0 0 12px var(--void-glow), 0 0 24px var(--void-glow);
        }

        .marker-power {
            background: var(--power);
            box-shadow: 0 0 16px var(--power-glow), 0 0 32px var(--power-glow);
        }

        /* ============ Close buttons & Mobile controls ============ */
        .close-panel-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border);
            color: var(--text-bright);
            font-size: 20px;
            cursor: pointer;
            display: none; /* Hidden on desktop */
            align-items: center;
            justify-content: center;
            z-index: 1001;
            transition: background 0.2s, transform 0.2s;
        }

        .close-panel-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .close-panel-btn:active {
            transform: scale(0.9);
        }

        .mobile-controls {
            display: none; /* Hidden on desktop */
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            background: rgba(12, 18, 30, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 6px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            gap: 6px;
        }

        .mobile-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-family: var(--font-ui);
            font-size: 13px;
            font-weight: 500;
            padding: 10px 20px;
            border-radius: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .mobile-btn.active {
            background: var(--accent-dim);
            color: var(--accent);
            font-weight: 600;
            box-shadow: inset 0 0 0 1px rgba(79, 195, 247, 0.2);
        }

        .mobile-btn-icon {
            font-size: 15px;
        }

        .mobile-badge {
            background: var(--accent);
            color: var(--bg-dark);
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 2px;
            font-family: var(--font-mono);
        }

        .slider-input {
            background: transparent;
            border: none;
            border-bottom: 1px dashed var(--accent);
            color: var(--accent);
            font-family: var(--font-mono);
            font-size: 13px;
            font-weight: 600;
            width: 70px;
            text-align: right;
            padding: 0 2px;
            outline: none;
        }

        .slider-input::-webkit-outer-spin-button,
        .slider-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .slider-input[type=number] {
            -moz-appearance: textfield;
        }

        /* ============ Checkbox / Toggle ============ */
        .checkbox-field {
            margin-bottom: 16px;
            display: flex;
            align-items: center;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            position: relative;
            cursor: pointer;
            font-size: 13px;
            user-select: none;
            color: var(--text);
            font-family: var(--font-ui);
            gap: 10px;
        }

        .checkbox-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .checkmark {
            height: 18px;
            width: 18px;
            background-color: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 4px;
            transition: all 0.2s ease;
            position: relative;
            flex-shrink: 0;
        }

        .checkbox-container:hover input ~ .checkmark {
            border-color: var(--accent);
            background-color: rgba(79, 195, 247, 0.05);
        }

        .checkbox-container input:checked ~ .checkmark {
            background-color: var(--accent-dim);
            border-color: var(--accent);
            box-shadow: 0 0 8px var(--accent-dim);
        }

        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
        }

        .checkbox-container input:checked ~ .checkmark:after {
            display: block;
        }

        .checkbox-container .checkmark:after {
            left: 6px;
            top: 2px;
            width: 4px;
            height: 9px;
            border: solid var(--accent);
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .checkbox-label {
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 500;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.2s;
        }

        .checkbox-container:hover .checkbox-label {
            color: var(--text-bright);
        }

        .checkbox-container input:checked ~ .checkbox-label {
            color: var(--text-bright);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .close-panel-btn {
                display: flex;
            }

            .mobile-controls {
                display: flex;
            }

            .panel {
                position: fixed;
                top: auto;
                left: 0;
                right: 0;
                bottom: 0;
                width: 100% !important;
                max-height: 75vh;
                border-radius: 24px 24px 0 0;
                border: 1px solid var(--border);
                border-bottom: none;
                margin: 0;
                transform: translateY(100%);
                transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
                box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.4);
                padding: 24px 24px 40px 24px;
            }

            .panel.open {
                transform: translateY(0);
            }

            .results-panel {
                position: fixed;
                top: auto;
                left: 0;
                right: 0;
                bottom: 0;
                width: 100% !important;
                max-height: 75vh;
                border-radius: 24px 24px 0 0;
                border: 1px solid var(--border);
                border-bottom: none;
                margin: 0;
                transform: translateY(100%);
                transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
                box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.4);
                padding: 24px 24px 40px 24px;
            }

            .results-panel.open {
                transform: translateY(0);
            }

            .leaflet-control-zoom {
                display: none !important;
            }

            .leaflet-control-attribution {
                margin-bottom: 76px !important;
                border-radius: 4px !important;
            }
        }
    </style>
</head>

<body>
    <div id="map"></div>

    <!-- Control Panel -->
    <div class="panel open" id="controlPanel">
        <button class="close-panel-btn" id="closeSettingsBtn">&times;</button>
        <div class="panel-header">
            <div class="logo">⬡</div>
            <div style="flex-grow: 1;">
                <h1>Open Randonaut</h1>
                <div class="version">v0.1.0 // quantum entropy</div>
            </div>
            <a href="https://github.com/herabel" target="_blank" style="text-decoration: none; color: var(--text-dim); display: flex; align-items: center; justify-content: center; transition: color 0.2s;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text-dim)'" title="GitHub Профиль">
                <svg height="20" width="20" viewBox="0 0 16 16" fill="currentColor" style="display: block;">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
                </svg>
            </a>
        </div>

        <div class="field">
            <label>Координаты центра</label>
            <input type="text" id="coordInput" placeholder="Кликните на карту..." readonly>
        </div>

        <div class="slider-field">
            <div class="slider-header">
                <label>Радиус</label>
                <div style="display:flex; align-items:center; gap:2px;">
                    <input type="number" id="radiusInput" class="slider-input" min="500" max="500000" value="3000">
                    <span style="font-size:12px; color:var(--accent); font-family:var(--font-mono); font-weight:600; padding-left:2px;">м</span>
                </div>
            </div>
            <input type="range" id="radiusSlider" min="500" max="500000" value="3000" step="100">
        </div>

        <div class="slider-field">
            <div class="slider-header">
                <label>Точки</label>
                <input type="number" id="pointsInput" class="slider-input" min="128" max="65536" value="1024">
            </div>
            <input type="range" id="pointsSlider" min="128" max="65536" value="1024" step="128">
        </div>

        <div class="field">
            <label>Намерение <span style="opacity:0.4">(опционально)</span></label>
            <input type="text" id="intentInput" placeholder="Введите своё намерение...">
        </div>

        <div class="checkbox-field">
            <label class="checkbox-container">
                <input type="checkbox" id="excludeWaterCheckbox">
                <span class="checkmark"></span>
                <span class="checkbox-label">Исключить воду</span>
            </label>
        </div>

        <button class="btn-generate" id="generateBtn" disabled>Генерировать</button>

        <div class="status-line" id="statusLine">
            <div class="status-dot ready" id="statusDot"></div>
            <span id="statusText">Кликните на карту для выбора центра</span>
        </div>

        <div class="entropy-tags" id="entropyTags"></div>

        <div class="hint">
            <span class="key">Click</span> на карту — установить центр
        </div>
    </div>

    <!-- Results Panel -->
    <div class="results-panel" id="resultsPanel">
        <button class="close-panel-btn" id="closeResultsBtn">&times;</button>
        <h2>Аномалии <span class="count" id="anomalyCount">0</span></h2>
        <div id="anomalyList"></div>
    </div>

    <!-- Mobile Navigation Bar -->
    <div class="mobile-controls" id="mobileControls">
        <button class="mobile-btn active" id="mobileToggleSettings">
            <span class="mobile-btn-icon">⚙️</span>
            <span>Параметры</span>
        </button>
        <button class="mobile-btn" id="mobileToggleResults" style="display: none;">
            <span class="mobile-btn-icon">📊</span>
            <span>Аномалии</span>
            <span class="mobile-badge" id="mobileAnomalyBadge">0</span>
        </button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        (function () {
            'use strict';

            // ============ API Configuration ============
            // Запросы к API делаем относительными к текущему хосту
            const API_BASE_URL = '';

            // ============ Map Init ============
            const map = L.map('map', {
                center: [55.7558, 37.6173],
                zoom: 12,
                zoomControl: true,
                attributionControl: true
            });

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(map);

            document.getElementById('map').classList.add('crosshair-cursor');

            // ============ State ============
            let selectedCoord = null;
            let centerMarker = null;
            let radiusCircle = null;
            let pointMarkers = [];
            let anomalyMarkers = [];

            const controlPanel = document.getElementById('controlPanel');
            const coordInput = document.getElementById('coordInput');
            const radiusSlider = document.getElementById('radiusSlider');
            const radiusInput = document.getElementById('radiusInput');
            const pointsSlider = document.getElementById('pointsSlider');
            const pointsInput = document.getElementById('pointsInput');
            const intentInput = document.getElementById('intentInput');
            const generateBtn = document.getElementById('generateBtn');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const resultsPanel = document.getElementById('resultsPanel');
            const anomalyCount = document.getElementById('anomalyCount');
            const anomalyList = document.getElementById('anomalyList');
            const entropyTags = document.getElementById('entropyTags');
            
            const mobileToggleSettings = document.getElementById('mobileToggleSettings');
            const mobileToggleResults = document.getElementById('mobileToggleResults');

            // ============ Sliders ============
            radiusSlider.addEventListener('input', () => {
                radiusInput.value = radiusSlider.value;
                updateRadiusCircle();
            });
            radiusInput.addEventListener('input', () => {
                let val = parseInt(radiusInput.value);
                if (isNaN(val)) return;
                radiusSlider.value = val;
                updateRadiusCircle();
            });
            radiusInput.addEventListener('change', () => {
                let val = parseInt(radiusInput.value);
                if (isNaN(val)) val = 3000;
                val = Math.max(500, Math.min(500000, val));
                radiusInput.value = val;
                radiusSlider.value = val;
                updateRadiusCircle();
            });

            pointsSlider.addEventListener('input', () => {
                pointsInput.value = pointsSlider.value;
            });
            pointsInput.addEventListener('input', () => {
                let val = parseInt(pointsInput.value);
                if (isNaN(val)) return;
                pointsSlider.value = val;
            });
            pointsInput.addEventListener('change', () => {
                let val = parseInt(pointsInput.value);
                if (isNaN(val)) val = 1024;
                val = Math.max(128, Math.min(65536, val));
                pointsInput.value = val;
                pointsSlider.value = val;
            });

            // ============ Map Click ============
            map.on('click', function (e) {
                selectedCoord = e.latlng;
                coordInput.value = `${e.latlng.lat.toFixed(6)}, ${e.latlng.lng.toFixed(6)}`;
                generateBtn.disabled = false;
                statusText.textContent = 'Центр установлен — готово к генерации';

                if (centerMarker) map.removeLayer(centerMarker);
                centerMarker = L.circleMarker(e.latlng, {
                    radius: 6,
                    color: '#4fc3f7',
                    fillColor: '#4fc3f7',
                    fillOpacity: 1,
                    weight: 2
                }).addTo(map);

                updateRadiusCircle();

                // Auto-open settings panel on mobile when map is clicked
                controlPanel.classList.add('open');
                mobileToggleSettings.classList.add('active');
                
                // Close results panel just in case
                resultsPanel.classList.remove('open');
                mobileToggleResults.classList.remove('active');
                setTimeout(() => {
                    if (!resultsPanel.classList.contains('open')) {
                        resultsPanel.style.display = 'none';
                    }
                }, 350);
            });

            function updateRadiusCircle() {
                if (!selectedCoord) return;
                if (radiusCircle) map.removeLayer(radiusCircle);
                radiusCircle = L.circle(selectedCoord, {
                    radius: parseInt(radiusInput.value),
                    color: 'rgba(79, 195, 247, 0.4)',
                    fillColor: 'rgba(79, 195, 247, 0.06)',
                    weight: 1,
                    dashArray: '6 4'
                }).addTo(map);
            }

            // ============ Clear previous results ============
            function clearResults() {
                pointMarkers.forEach(m => map.removeLayer(m));
                anomalyMarkers.forEach(m => map.removeLayer(m));
                pointMarkers = [];
                anomalyMarkers = [];
                resultsPanel.style.display = 'none';
                resultsPanel.classList.remove('open');
                mobileToggleResults.style.display = 'none';
                mobileToggleResults.classList.remove('active');
                anomalyList.innerHTML = '';
                entropyTags.innerHTML = '';
            }

            // ============ Check if coordinate is in water using is-on-water API ============
            async function isWaterCoordinate(lat, lon) {
                try {
                    const response = await fetch(`https://is-on-water.balbona.me/api/v1/get/${lat}/${lon}`);
                    if (!response.ok) return false;
                    const result = await response.json();
                    return result.isWater === true;
                } catch (e) {
                    console.error("Ошибка при проверке воды через is-on-water API:", e);
                    return false;
                }
            }

            // ============ Generate ============
            generateBtn.addEventListener('click', async () => {
                if (!selectedCoord) return;

                clearResults();

                generateBtn.disabled = true;
                generateBtn.classList.add('loading');
                generateBtn.textContent = 'Генерация...';
                statusDot.className = 'status-dot working';
                statusText.textContent = 'Сбор энтропии и анализ аномалий...';

                const body = {
                    lat: selectedCoord.lat,
                    lon: selectedCoord.lng,
                    radius: parseInt(radiusInput.value),
                    point_count: parseInt(pointsInput.value),
                };

                const intent = intentInput.value.trim();
                if (intent) body.intent = intent;

                try {
                    const resp = await fetch(`${API_BASE_URL}/api/generate`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body),
                    });

                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    const data = await resp.json();

                    let excludedWaterCount = 0;
                    if (document.getElementById('excludeWaterCheckbox').checked && data.anomalies && data.anomalies.length > 0) {
                        statusText.textContent = 'Фильтрация водных преград...';
                        const filterResults = await Promise.all(
                            data.anomalies.map(async (anomaly) => {
                                const isWater = await isWaterCoordinate(anomaly.coord.lat, anomaly.coord.lon);
                                return { anomaly, isWater };
                            })
                        );
                        const originalCount = data.anomalies.length;
                        data.anomalies = filterResults
                            .filter(r => !r.isWater)
                            .map(r => r.anomaly);
                        excludedWaterCount = originalCount - data.anomalies.length;
                    }

                    displayResults(data, excludedWaterCount);

                } catch (err) {
                    statusDot.className = 'status-dot';
                    statusText.textContent = `Ошибка: ${err.message}`;
                } finally {
                    generateBtn.disabled = false;
                    generateBtn.classList.remove('loading');
                    generateBtn.textContent = 'Генерировать';
                }
            });

            // ============ Display Results ============
            function displayResults(data, excludedWaterCount = 0) {
                statusDot.className = 'status-dot ready';
                let statusMsg = `Найдено аномалий: ${data.anomalies.length} из ${data.point_count} точек`;
                if (excludedWaterCount > 0) {
                    statusMsg += ` (исключено на воде: ${excludedWaterCount})`;
                }
                statusText.textContent = statusMsg;

                // Entropy tags
                entropyTags.innerHTML = '';
                (data.entropy_sources || []).forEach(src => {
                    const tag = document.createElement('span');
                    tag.className = 'entropy-tag';
                    tag.textContent = src;
                    entropyTags.appendChild(tag);
                });

                // Draw point cloud (small transparent dots)
                if (data.points && data.points.length <= 10000) {
                    data.points.forEach(p => {
                        const m = L.circleMarker([p.lat, p.lon], {
                            radius: 1.5,
                            color: 'rgba(79, 195, 247, 0.25)',
                            fillColor: 'rgba(79, 195, 247, 0.15)',
                            fillOpacity: 1,
                            weight: 0,
                        }).addTo(map);
                        pointMarkers.push(m);
                    });
                }

                // Draw anomalies
                // Hide settings panel on mobile when showing results
                controlPanel.classList.remove('open');
                mobileToggleSettings.classList.remove('active');

                if (data.anomalies.length === 0) {
                    anomalyCount.textContent = '0';
                    mobileToggleResults.style.display = 'flex';
                    document.getElementById('mobileAnomalyBadge').textContent = '0';
                    resultsPanel.style.display = 'block';
                    setTimeout(() => {
                        resultsPanel.classList.add('open');
                        mobileToggleResults.classList.add('active');
                    }, 10);
                    
                    let noAnomalyMsg = 'Аномалий не найдено.<br>Попробуйте увеличить число точек.';
                    if (excludedWaterCount > 0) {
                        noAnomalyMsg = `Все найденные аномалии (${excludedWaterCount}) находились на воде и были исключены.`;
                    }
                    anomalyList.innerHTML = `<div style="text-align:center;color:var(--text-dim);font-size:12px;padding:20px;">${noAnomalyMsg}</div>`;
                    return;
                }

                anomalyCount.textContent = data.anomalies.length;
                mobileToggleResults.style.display = 'flex';
                document.getElementById('mobileAnomalyBadge').textContent = data.anomalies.length;
                resultsPanel.style.display = 'block';
                setTimeout(() => {
                    resultsPanel.classList.add('open');
                    mobileToggleResults.classList.add('active');
                }, 10);

                data.anomalies.forEach((anomaly, idx) => {
                    const typeClass = anomaly.type;
                    const typeLabels = {
                        attractor: 'Аттрактор',
                        void: 'Войд',
                        power: 'Power (Blind Spot)'
                    };
                    const markerColors = {
                        attractor: '#ff5252',
                        void: '#448aff',
                        power: '#ffd740',
                    };

                    // Map marker
                    const size = anomaly.type === 'power' ? 14 : 10;
                    const icon = L.divIcon({
                        className: `marker-${anomaly.type}`,
                        iconSize: [size, size],
                        iconAnchor: [size / 2, size / 2],
                    });

                    const marker = L.marker([anomaly.coord.lat, anomaly.coord.lon], { icon })
                        .addTo(map)
                        .bindPopup(`
                        <div style="font-family:'JetBrains Mono',monospace;font-size:12px;">
                            <strong style="color:${markerColors[anomaly.type]}">${typeLabels[anomaly.type]}</strong><br>
                            z-score: <strong>${anomaly.z_score}</strong><br>
                            Точек в ячейке: ${anomaly.point_count}<br>
                            <a href="${anomaly.google_maps_url}" target="_blank" style="color:#4fc3f7;">
                                Google Maps ↗
                            </a>
                        </div>
                    `);
                    anomalyMarkers.push(marker);

                    // Result card
                    const card = document.createElement('div');
                    card.className = `anomaly-card ${typeClass}`;
                    card.innerHTML = `
                    <div class="anomaly-type">${typeLabels[anomaly.type]}</div>
                    <div class="anomaly-meta">
                        z-score: <strong>${anomaly.z_score}</strong><br>
                        Координаты: ${anomaly.coord.lat.toFixed(6)}, ${anomaly.coord.lon.toFixed(6)}<br>
                        Точек: ${anomaly.point_count}
                    </div>
                    <a href="${anomaly.google_maps_url}" target="_blank" class="anomaly-link">
                        Открыть в Google Maps ↗
                    </a>
                `;
                    card.addEventListener('click', () => {
                        map.flyTo([anomaly.coord.lat, anomaly.coord.lon], 15, { duration: 0.8 });
                        marker.openPopup();
                        
                        // Close results panel on mobile so the user can inspect the map
                        if (window.innerWidth <= 768) {
                            resultsPanel.classList.remove('open');
                            mobileToggleResults.classList.remove('active');
                            setTimeout(() => {
                                if (!resultsPanel.classList.contains('open')) {
                                    resultsPanel.style.display = 'none';
                                }
                            }, 350);
                        }
                    });
                    anomalyList.appendChild(card);
                });

                // Fit bounds to see all anomalies
                const allCoords = data.anomalies.map(a => [a.coord.lat, a.coord.lon]);
                if (selectedCoord) allCoords.push([selectedCoord.lat, selectedCoord.lng]);
                if (allCoords.length > 1) {
                    map.fitBounds(allCoords, { padding: [60, 60], maxZoom: 14 });
                }
            }

            // ============ Geolocation ============
            if ('geolocation' in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        map.setView([pos.coords.latitude, pos.coords.longitude], 13);
                    },
                    () => { /* ignore */ },
                    { enableHighAccuracy: false, timeout: 5000 }
                );
            }

            // ============ Mobile Event Listeners ============
            document.getElementById('closeSettingsBtn').addEventListener('click', () => {
                controlPanel.classList.remove('open');
                mobileToggleSettings.classList.remove('active');
            });

            document.getElementById('closeResultsBtn').addEventListener('click', () => {
                resultsPanel.classList.remove('open');
                mobileToggleResults.classList.remove('active');
                setTimeout(() => {
                    if (!resultsPanel.classList.contains('open')) {
                        resultsPanel.style.display = 'none';
                    }
                }, 350);
            });

            mobileToggleSettings.addEventListener('click', () => {
                const isOpen = controlPanel.classList.contains('open');
                if (isOpen) {
                    controlPanel.classList.remove('open');
                    mobileToggleSettings.classList.remove('active');
                } else {
                    // Close results if open
                    resultsPanel.classList.remove('open');
                    mobileToggleResults.classList.remove('active');
                    setTimeout(() => {
                        if (!resultsPanel.classList.contains('open')) {
                            resultsPanel.style.display = 'none';
                        }
                    }, 350);

                    controlPanel.classList.add('open');
                    mobileToggleSettings.classList.add('active');
                }
            });

            mobileToggleResults.addEventListener('click', () => {
                const isOpen = resultsPanel.classList.contains('open');
                if (isOpen) {
                    resultsPanel.classList.remove('open');
                    mobileToggleResults.classList.remove('active');
                    setTimeout(() => {
                        if (!resultsPanel.classList.contains('open')) {
                            resultsPanel.style.display = 'none';
                        }
                    }, 350);
                } else {
                    // Close settings if open
                    controlPanel.classList.remove('open');
                    mobileToggleSettings.classList.remove('active');

                    resultsPanel.style.display = 'block';
                    setTimeout(() => {
                        resultsPanel.classList.add('open');
                        mobileToggleResults.classList.add('active');
                    }, 10);
                }
            });

        })();
    </script>
</body>

</html>
